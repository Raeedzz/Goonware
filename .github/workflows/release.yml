# Release pipeline for GLI.
#
# Trigger: every push to `main` (which includes merged PRs). The
# workflow computes the next version by patch-bumping the latest
# `v*` git tag, patches that version into `package.json`,
# `src-tauri/tauri.conf.json`, and `src-tauri/Cargo.toml`, builds a
# universal macOS DMG, signs the update artifact with the Tauri
# updater key, and publishes a GitHub Release as *Latest* (not draft).
#
# The published release also contains a `latest.json` — the file the
# installed app polls at
# `https://github.com/Raeedzz/GLI/releases/latest/download/latest.json`
# to discover new versions. Because we publish as Latest immediately,
# every push to main ships an update; `UpdaterToast.tsx` shows the
# prompt in the corner on the user's next app start.
#
# ──────────────────────────── one-time setup ────────────────────────────
#
# 1. Generate the updater keypair on your dev machine:
#
#      mkdir -p ~/.tauri
#      npx @tauri-apps/cli signer generate --password "" --ci -w ~/.tauri/gli.key
#
#    (Use `--password "<your-password>"` instead of empty if you want
#    one. If you set a password, also add the secret in step 3.)
#
# 2. Paste the public key into `src-tauri/tauri.conf.json`:
#
#      "plugins": {
#        "updater": {
#          "endpoints": [...],
#          "pubkey": "<paste here>"
#        }
#      }
#
# 3. Add the GitHub secret at
#    https://github.com/Raeedzz/GLI/settings/secrets/actions :
#
#      TAURI_SIGNING_PRIVATE_KEY          ← contents of ~/.tauri/gli.key
#      TAURI_SIGNING_PRIVATE_KEY_PASSWORD ← (only if you set one in step 1)
#
# 4. (Optional — Apple notarization) If you want users to skip the
#    Gatekeeper warning on first install, add the Apple secrets too:
#
#      APPLE_CERTIFICATE             ← base64 of your .p12 Developer ID cert
#      APPLE_CERTIFICATE_PASSWORD    ← .p12 password
#      APPLE_SIGNING_IDENTITY        ← e.g. "Developer ID Application: Name (TEAMID)"
#      APPLE_ID                      ← Apple account email
#      APPLE_PASSWORD                ← app-specific password
#      APPLE_TEAM_ID                 ← 10-char team id
#
#    Without these the build still runs and updates still install
#    (Tauri's ed25519 signature covers integrity); users just see
#    Gatekeeper on the very first install.
#
# ──────────────────────────── shipping a release ────────────────────────────
#
# Just push to main. The next version is `latest_v_tag + patch`.
# If you want to bump minor/major manually, push a tag yourself:
#
#      git tag v0.1.0 && git push origin v0.1.0
#
# That tag becomes the new "latest" and the next push to main will
# compute v0.1.1.
#
# To skip a release for docs-only / non-code commits, include
# `[skip ci]` in the commit message.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one release at a time. If a push lands while one is running,
# it queues; any further pushes replace the queued one (so the
# eventual release ships the latest commit, not every intermediate).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Build & publish (macOS)
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version from latest git tag
        id: ver
        run: |
          set -euo pipefail
          # Most-recent v* tag, sorted as semver. If none exist this
          # is the very first release.
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            NEW="v0.0.1"
          else
            NUMS=${LATEST#v}
            IFS=. read -r MAJ MIN PAT <<< "$NUMS"
            PAT=$((PAT + 1))
            NEW="v${MAJ}.${MIN}.${PAT}"
          fi
          echo "tag=$NEW"            >> "$GITHUB_OUTPUT"
          echo "version=${NEW#v}"    >> "$GITHUB_OUTPUT"
          echo "Bumping ${LATEST:-<none>} → $NEW"

      - name: Patch version into source manifests
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # tauri.conf.json — what tauri-action reads and what gets
          # baked into the binary; this is the version users see and
          # what the updater compares.
          jq --arg v "$NEW_VERSION" '.version = $v' src-tauri/tauri.conf.json > /tmp/c.json
          mv /tmp/c.json src-tauri/tauri.conf.json

          # package.json — cosmetic; kept in sync so npm tooling and
          # tauri-action's version detection agree.
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > /tmp/p.json
          mv /tmp/p.json package.json

          # Cargo.toml — first `version = "..."` line lives under
          # `[package]`. Replace only that occurrence.
          sed -i.bak -E '0,/^version = ".*"$/s//version = "'"$NEW_VERSION"'"/' src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak

          echo "Patched manifests:"
          jq -r '"  tauri.conf.json -> " + .version' src-tauri/tauri.conf.json
          jq -r '"  package.json    -> " + .version' package.json
          grep -m1 '^version' src-tauri/Cargo.toml | sed 's/^/  Cargo.toml      -> /'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Download `rg` sidecar binaries
        # The bundler refuses to package an externalBin path that
        # doesn't exist; this script fetches the macOS binaries our
        # bundle declares in `tauri.conf.json`.
        run: bun run download-rg

      - name: Import Apple Developer certificate
        # Decodes the .p12 from the APPLE_CERTIFICATE secret into a
        # fresh build-only keychain. We create our own keychain
        # rather than using the default one so a flaky build can't
        # leave stray certs lying around the runner image (and so
        # KEYCHAIN_PASSWORD can be a throwaway, not anything we'd
        # ever reuse).
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain  -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain  -p "$KEYCHAIN_PASSWORD" build.keychain
          # 3600s auto-lock + lock on sleep is plenty for the build window.
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$RUNNER_TEMP/certificate.p12" \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          # Without this, codesign would be prompted GUI-style for
          # access to the private key on every invocation. The
          # partition list authorizes apple-tool/codesign/etc. to
          # use the key non-interactively under our keychain pwd.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Resolve signing identity name
        # Reads the "Developer ID Application: …" CN back out of the
        # imported cert and surfaces it as APPLE_SIGNING_IDENTITY for
        # later steps. This avoids hardcoding the identity string in
        # the workflow — rotate the cert and nothing here changes.
        run: |
          set -euo pipefail
          CERT_LINE=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_LINE" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "Will sign with: $CERT_ID"

      - name: Build & sign DMG, publish release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — required for the updater plugin to
          # accept the build. The pubkey baked into the app must
          # match the private key here.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID signing + notarization. APPLE_SIGNING_IDENTITY
          # is populated by the "Resolve signing identity name" step
          # above, not from a raw secret.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Build universal so a single DMG runs on Apple Silicon + Intel.
          args: --target universal-apple-darwin
          tagName: ${{ steps.ver.outputs.tag }}
          releaseName: "GLI ${{ steps.ver.outputs.tag }}"
          # Publish as Latest immediately so users' installed builds
          # see the new version on their next poll. Drafts would
          # require manual promotion before the updater toast fires.
          releaseDraft: false
          prerelease: false
          # Generate + upload `latest.json` so the installed app's
          # configured endpoint resolves to a real artifact.
          updaterJsonPreferNsis: false
          includeUpdaterJson: true

      # Publish a stable filename `Goonware.dmg` alongside the versioned
      # DMG, so the landing page's
      # `/releases/latest/download/Goonware.dmg` link resolves without
      # needing to be bumped each release.
      - name: Upload Goonware.dmg asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          DMG=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -n1)
          cp "$DMG" "Goonware.dmg"
          gh release upload "$TAG" "Goonware.dmg" --clobber
